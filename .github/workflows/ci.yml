name: CI — Build, Test, Push, Deploy

on:
  push:
    branches: [main]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Uruchom testy (Składnia)
        run: |
          python3 -m compileall app/app.py

      - name: Zaloguj się do ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Zbuduj i wypchnij obraz
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/app:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile .
          docker push $IMAGE

      - name: Konfiguracja dostępu do AKS
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config

      - name: Zaktualizuj obraz w AKS
        run: |
          kubectl set image deployment/app \
            app=${{ secrets.ACR_LOGIN_SERVER }}/app:${{ github.sha }}
          kubectl rollout status deployment/app --timeout=120s